<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instituto Digital Geizy Mac</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #6b1d3a, #8c2f4f);
      color: white;
      text-align: center;
    }

    header {
      padding: 70px 20px 40px;
    }

    header h1 {
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    header p {
      font-size: 18px;
      opacity: 0.9;
    }

    .secao {
      background: white;
      color: #6b1d3a;
      padding: 60px 20px;
      border-radius: 40px 40px 0 0;
      margin-top: 40px;
    }

    .secao h2 {
      font-size: 28px;
      margin-bottom: 25px;
    }

    .icones {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .secao p {
      font-size: 17px;
      max-width: 650px;
      margin: 0 auto 35px;
      line-height: 1.6;
    }

    .botao {
      display: inline-block;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: bold;
      color: #6b1d3a;
      background: linear-gradient(45deg, #d4af37, #f5d76e);
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }
