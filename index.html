<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Instituto Digital Geizy Macedo</title>
 <link rel="stylesheet" href="estilo.css?v=3">
</head>
<body>

  <div class="container" id="login-area">
    <h1>Instituto Digital Geizy Macedo</h1>
    <p>Plataforma educacional oficial</p>

    <div class="login-box">
      <input type="text" id="nome" placeholder="Nome">
      <input type="password" id="senha" placeholder="Senha">
      <input type="text" id="codigo" placeholder="Código da Turma">
      <button id="entrar">Entrar na Plataforma</button>
      <p id="mensagem"></p>
    </div>
  </div>

  <div class="container" id="area-aluno" style="display:none;">
    <h1>Bem-vindo(a) ao Instituto Digital 👑</h1>
    <p id="boasVindas"></p>

    <div class="menu">
      <button>Avaliações</button>
      <button>Área Criativa</button>
      <button>Mural da Escola</button>
      <button>Desafios Semanais</button>
    </div>

    <br>
    <button onclick="logout()">Sair</button>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
